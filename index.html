<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOPIK 1 시험 시뮬레이터</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-navy: #0D2461;
      --color-navy-mid: #1A3A7C;
      --color-navy-light: #2B52A3;
      --color-white: #FFFFFF;
      --color-bg: #F4F6FB;
      --color-surface: #FFFFFF;
      --color-border: #D0D8EE;
      --color-text-primary: #1A1A2E;
      --color-text-muted: #6B7A9A;
      --state-unanswered: #E8ECF7;
      --state-answered: #2B52A3;
      --state-marked: #F5A623;
      --state-current: #0D2461;
      --timer-normal: #0D2461;
      --timer-warning: #E87020;
      --timer-critical: #C0392B;
      --font-korean: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      --font-latin: 'Inter', 'Segoe UI', sans-serif;
      --font-size-base: 16px;
      --font-size-sm: 14px;
      --font-size-xs: 12px;
      --font-size-lg: 18px;
      --font-size-xl: 22px;
      --font-size-2xl: 28px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --sidebar-width: 220px;
      --header-height: 64px;
      --footer-height: 68px;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --shadow-card: 0 2px 12px rgba(13, 36, 97, 0.1);
      --shadow-elevated: 0 4px 24px rgba(13, 36, 97, 0.18);
    }

    body {
      font-family: var(--font-korean);
      background: var(--color-bg);
      color: var(--color-text-primary);
      font-size: var(--font-size-base);
      line-height: 1.6;
    }

    .screen {
      display: none;
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
    }

    .screen--active {
      display: flex;
    }

    #screen-start {
      background: var(--color-bg);
      justify-content: center;
      align-items: center;
      padding: var(--space-4);
    }

    .start-card {
      background: var(--color-white);
      border-radius: var(--border-radius-lg);
      padding: var(--space-8);
      max-width: 680px;
      width: 100%;
      box-shadow: var(--shadow-card);
    }

    .start-logo {
      text-align: center;
      margin-bottom: var(--space-8);
      font-size: 48px;
    }

    .start-title {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      text-align: center;
      color: var(--color-navy);
      margin-bottom: var(--space-4);
    }

    .start-subtitle {
      text-align: center;
      color: var(--color-text-muted);
      margin-bottom: var(--space-6);
      font-size: var(--font-size-sm);
    }

    .start-meta {
      background: var(--color-bg);
      border-radius: var(--border-radius-md);
      padding: var(--space-4);
      margin-bottom: var(--space-6);
      font-size: var(--font-size-sm);
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      padding: var(--space-3) 0;
      border-bottom: 1px solid var(--color-border);
    }

    .meta-row:last-child {
      border-bottom: none;
    }

    .meta-label {
      font-weight: 600;
      color: var(--color-navy);
    }

    .meta-value {
      color: var(--color-text-primary);
    }

    .start-options {
      margin-bottom: var(--space-6);
      padding: var(--space-4);
      background: var(--color-bg);
      border-radius: var(--border-radius-md);
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-3);
    }

    .checkbox-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .checkbox-item label {
      cursor: pointer;
      font-size: var(--font-size-sm);
    }

    .btn {
      padding: var(--space-3) var(--space-6);
      border: none;
      border-radius: var(--border-radius-md);
      font-size: var(--font-size-base);
      font-family: var(--font-korean);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
    }

    .btn--primary {
      background: var(--color-navy);
      color: var(--color-white);
      width: 100%;
      padding: var(--space-4) var(--space-6);
      font-size: var(--font-size-lg);
    }

    .btn--primary:hover {
      background: var(--color-navy-mid);
    }

    .btn--secondary {
      background: transparent;
      color: var(--color-navy);
      border: 2px solid var(--color-navy);
    }

    .btn--secondary:hover {
      background: var(--color-bg);
    }

    .btn--ghost {
      background: transparent;
      color: var(--color-navy);
      padding: var(--space-2) var(--space-3);
      font-size: var(--font-size-sm);
    }

    .btn--ghost:hover {
      background: var(--color-bg);
    }

    .btn--icon {
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 50%;
      background: var(--color-bg);
    }

    #screen-exam {
      flex-direction: column;
      background: var(--color-bg);
    }

    .exam-header {
      background: var(--color-navy);
      color: var(--color-white);
      padding: 0 var(--space-6);
      height: var(--header-height);
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(13, 36, 97, 0.15);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .exam-header__left {
      flex: 1;
    }

    .exam-header__center {
      flex: 1;
      text-align: center;
    }

    .exam-header__right {
      flex: 1;
      text-align: right;
      font-size: var(--font-size-sm);
      color: rgba(255, 255, 255, 0.9);
    }

    .section-label {
      font-size: var(--font-size-xs);
      opacity: 0.8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .question-counter {
      font-size: var(--font-size-lg);
      font-weight: 700;
    }

    .timer-block {
      text-align: center;
    }

    .timer-label {
      font-size: var(--font-size-xs);
      opacity: 0.8;
      margin-bottom: 2px;
    }

    .timer-display {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      font-family: 'Courier New', monospace;
      color: var(--color-white);
    }

    .timer-display--warning {
      color: var(--timer-warning);
    }

    .timer-display--critical {
      color: var(--timer-critical);
      animation: pulse 0.8s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .timer-progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: rgba(255, 255, 255, 0.3);
      transition: width 0.1s linear;
    }

    .exam-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .question-panel {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-8);
      background: var(--color-white);
    }

    .question-wrapper {
      max-width: 700px;
      margin: 0 auto;
    }

    .question-number {
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: var(--space-3);
    }

    .question-prompt {
      font-size: var(--font-size-lg);
      font-weight: 600;
      color: var(--color-navy);
      margin-bottom: var(--space-3);
      line-height: 1.5;
    }

    .question-romanization {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      font-style: italic;
      margin-bottom: var(--space-6);
    }

    .question-audio-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
      background: var(--color-navy-light);
      color: var(--color-white);
      border: none;
      border-radius: var(--border-radius-md);
      cursor: pointer;
      font-family: var(--font-korean);
      font-size: var(--font-size-sm);
      margin-bottom: var(--space-6);
    }

    .question-audio-btn:hover {
      background: var(--color-navy);
    }

    .question-script {
      background: var(--color-bg);
      padding: var(--space-4);
      border-left: 3px solid var(--color-navy);
      margin-bottom: var(--space-6);
      border-radius: var(--border-radius-md);
      font-size: var(--font-size-sm);
    }

    .script-line {
      margin-bottom: var(--space-3);
      line-height: 1.5;
    }

    .script-speaker {
      font-weight: 600;
      color: var(--color-navy);
    }

    .script-text {
      margin-left: var(--space-4);
      color: var(--color-text-primary);
    }

    .passage-text {
      background: var(--color-bg);
      padding: var(--space-4);
      border-radius: var(--border-radius-md);
      margin-bottom: var(--space-6);
      line-height: 1.7;
      font-size: var(--font-size-base);
    }

    .answer-options {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-4);
    }

    .answer-option {
      padding: var(--space-4);
      border: 2px solid var(--color-border);
      border-radius: var(--border-radius-md);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      gap: var(--space-4);
      align-items: flex-start;
      background: var(--color-white);
    }

    .answer-option:hover {
      border-color: var(--color-navy-light);
      background: rgba(43, 82, 163, 0.05);
    }

    .answer-option--selected {
      border-color: var(--color-navy);
      background: rgba(43, 82, 163, 0.1);
    }

    .answer-option__number {
      min-width: 32px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--color-navy);
      color: var(--color-white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: var(--font-size-sm);
    }

    .answer-option--selected .answer-option__number {
      background: var(--color-navy-light);
    }

    .answer-option__content {
      flex: 1;
    }

    .answer-option__text {
      font-weight: 500;
      color: var(--color-text-primary);
      margin-bottom: 4px;
    }

    .answer-option__rom {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      font-style: italic;
    }

    .sidebar {
      width: var(--sidebar-width);
      background: var(--color-white);
      border-left: 1px solid var(--color-border);
      overflow-y: auto;
      padding: var(--space-4);
      display: flex;
      flex-direction: column;
    }

    .sidebar__section-label {
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--color-navy);
      margin-top: var(--space-4);
      margin-bottom: var(--space-3);
      text-transform: uppercase;
      font-size: var(--font-size-xs);
    }

    .sidebar__grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-bottom: var(--space-6);
    }

    .grid-cell {
      width: 35px;
      height: 35px;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      background: var(--state-unanswered);
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-size-xs);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .grid-cell:hover {
      border-color: var(--color-navy);
    }

    .grid-cell--answered {
      background: var(--state-answered);
      color: var(--color-white);
      border-color: var(--state-answered);
    }

    .grid-cell--marked {
      background: var(--state-marked);
      color: var(--color-white);
      border-color: var(--state-marked);
    }

    .grid-cell--current {
      border: 2px solid var(--color-navy);
      font-weight: 700;
    }

    .sidebar__divider {
      border: none;
      border-top: 1px solid var(--color-border);
      margin: var(--space-6) 0;
    }

    .sidebar__legend {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      padding-top: var(--space-4);
      border-top: 1px solid var(--color-border);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-2);
    }

    .legend-dot {
      width: 16px;
      height: 16px;
      border-radius: 2px;
    }

    .exam-footer {
      background: var(--color-white);
      border-top: 1px solid var(--color-border);
      padding: var(--space-4) var(--space-6);
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: var(--footer-height);
      gap: var(--space-4);
    }

    .footer-nav {
      display: flex;
      gap: var(--space-3);
    }

    .footer-actions {
      display: flex;
      gap: var(--space-3);
      margin-left: auto;
    }

    .mark-btn--active {
      color: var(--state-marked);
    }

    #screen-results {
      background: var(--color-bg);
      justify-content: center;
      align-items: center;
      overflow-y: auto;
      padding: var(--space-8);
    }

    .results-card {
      background: var(--color-white);
      border-radius: var(--border-radius-lg);
      padding: var(--space-8);
      max-width: 760px;
      width: 100%;
      box-shadow: var(--shadow-card);
    }

    .results-header {
      text-align: center;
      margin-bottom: var(--space-8);
      padding-bottom: var(--space-6);
      border-bottom: 2px solid var(--color-border);
    }

    .results-congrats {
      font-size: var(--font-size-xl);
      color: var(--color-navy);
      margin-bottom: var(--space-4);
    }

    .level-badge {
      display: inline-block;
      padding: var(--space-3) var(--space-6);
      border-radius: 20px;
      font-weight: 700;
      font-size: var(--font-size-lg);
      margin-bottom: var(--space-6);
    }

    .level-badge--level2 {
      background: #FFD700;
      color: #333;
    }

    .level-badge--level1 {
      background: #C0C0C0;
      color: #333;
    }

    .level-badge--fail {
      background: var(--color-border);
      color: var(--color-text-muted);
    }

    .score-total {
      font-size: 48px;
      font-weight: 700;
      color: var(--color-navy);
      margin-bottom: var(--space-4);
    }

    .score-subtext {
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
      margin-bottom: var(--space-6);
    }

    .score-sections {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-6);
      margin-top: var(--space-6);
    }

    .score-section {
      background: var(--color-bg);
      padding: var(--space-4);
      border-radius: var(--border-radius-md);
      text-align: center;
    }

    .score-section__label {
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
      margin-bottom: var(--space-2);
    }

    .score-section__value {
      font-size: 32px;
      font-weight: 700;
      color: var(--color-navy);
    }

    .review-section {
      margin-top: var(--space-8);
      padding-top: var(--space-6);
      border-top: 2px solid var(--color-border);
    }

    .review-toggle-btn {
      width: 100%;
      padding: var(--space-4);
      background: var(--color-bg);
      border: none;
      border-radius: var(--border-radius-md);
      cursor: pointer;
      font-family: var(--font-korean);
      font-weight: 600;
      color: var(--color-navy);
      font-size: var(--font-size-base);
      transition: all 0.2s ease;
      margin-bottom: var(--space-4);
    }

    .review-toggle-btn:hover {
      background: var(--color-navy-light);
      color: var(--color-white);
    }

    .review-list {
      display: none;
      list-style: none;
    }

    .review-list--open {
      display: block;
    }

    .review-item {
      padding: var(--space-4);
      margin-bottom: var(--space-3);
      background: var(--color-bg);
      border-left: 4px solid var(--color-border);
      border-radius: var(--border-radius-md);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .review-item:hover {
      background: rgba(43, 82, 163, 0.05);
    }

    .review-item--correct {
      border-left-color: #16a34a;
    }

    .review-item--incorrect {
      border-left-color: var(--timer-critical);
    }

    .review-item--skipped {
      border-left-color: var(--color-text-muted);
    }

    .review-item__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-2);
    }

    .review-item__number {
      font-weight: 600;
      color: var(--color-navy);
      font-size: var(--font-size-sm);
    }

    .review-item__result {
      font-size: var(--font-size-xs);
      font-weight: 600;
    }

    .review-item--correct .review-item__result {
      color: #16a34a;
    }

    .review-item--incorrect .review-item__result {
      color: var(--timer-critical);
    }

    .review-item--skipped .review-item__result {
      color: var(--color-text-muted);
    }

    .review-item__question {
      font-size: var(--font-size-sm);
      color: var(--color-text-primary);
      margin-bottom: var(--space-3);
      line-height: 1.5;
    }

    .review-answer-row {
      font-size: var(--font-size-sm);
      margin-bottom: var(--space-2);
    }

    .review-answer-label {
      color: var(--color-text-muted);
      font-weight: 600;
    }

    .review-answer-text {
      color: var(--color-text-primary);
    }

    .review-item__explanation {
      display: none;
      margin-top: var(--space-3);
      padding-top: var(--space-3);
      border-top: 1px solid var(--color-border);
      color: var(--color-text-muted);
      font-size: var(--font-size-sm);
      line-height: 1.6;
    }

    .review-item--open .review-item__explanation {
      display: block;
    }

    .results-actions {
      display: flex;
      gap: var(--space-4);
      margin-top: var(--space-8);
      justify-content: center;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: var(--color-white);
      border-radius: var(--border-radius-lg);
      padding: var(--space-8);
      max-width: 420px;
      width: 90%;
      box-shadow: var(--shadow-elevated);
    }

    .modal__title {
      font-size: var(--font-size-xl);
      font-weight: 700;
      color: var(--color-navy);
      margin-bottom: var(--space-4);
    }

    .modal__message {
      font-size: var(--font-size-base);
      color: var(--color-text-primary);
      margin-bottom: var(--space-6);
      line-height: 1.6;
    }

    .modal__buttons {
      display: flex;
      gap: var(--space-4);
    }

    .modal__btn {
      flex: 1;
      padding: var(--space-4);
      border: none;
      border-radius: var(--border-radius-md);
      font-family: var(--font-korean);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .modal__btn--primary {
      background: var(--color-navy);
      color: var(--color-white);
    }

    .modal__btn--primary:hover {
      background: var(--color-navy-mid);
    }

    .modal__btn--secondary {
      background: var(--color-bg);
      color: var(--color-navy);
      border: 2px solid var(--color-border);
    }

    .modal__btn--secondary:hover {
      border-color: var(--color-navy);
    }

    @media (max-width: 640px) {
      .sidebar {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: auto;
        max-height: 50vh;
        border-left: none;
        border-top: 1px solid var(--color-border);
        z-index: 40;
      }

      .sidebar--open {
        display: flex;
      }

      .exam-body {
        flex-direction: column;
      }

      .question-panel {
        padding: var(--space-4);
      }

      .exam-footer {
        padding-bottom: 220px;
      }

      .results-card {
        padding: var(--space-4);
      }

      .score-sections {
        grid-template-columns: 1fr;
      }

      .results-actions {
        flex-direction: column;
      }

      .timer-display {
        font-size: var(--font-size-xl);
      }

      .score-total {
        font-size: 36px;
      }
    }

    @media print {
      body { background: var(--color-white); }
      #screen-start, #screen-exam { display: none !important; }
      #screen-results { display: flex !important; position: static; }
      .results-actions, .review-toggle-btn { display: none; }
      .review-list { display: block !important; }
      .review-item__explanation { display: block !important; }

        { id: 66, section: 'reading', type: 'reading-comprehension', passage: { korean: '저는 매일 아침 6시에 일어납니다. 7시에 학교에 갑니다. 학교에서 열심히 공부합니다.', romanization: 'Jeoneun maeil achim 6si-e ireonamnida. 7si-e hakgyoe gamnida. Hakgyoeseo yeolsimhi gongbuhamnida.' }, question: { korean: '저는 몇 시에 일어나요?', romanization: 'Jeoneun myeot si-e ireonayo?' }, options: [{ korean: '6시', romanization: '6si' }, { korean: '7시', romanization: '7si' }, { korean: '8시', romanization: '8si' }, { korean: '9시', romanization: '9si' }], correctAnswer: 1, explanation: { english: 'According to the passage, the person wakes up at 6 AM every morning.' } },

    function init() {
      loadSessionFromStorage();
      showScreen('start');
      renderStartScreen();
    }

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('screen--active'));
      document.getElementById(`screen-${screenId}`).classList.add('screen--active');
      AppState.phase = screenId;
    }

    function renderStartScreen() {
      const startBtn = document.getElementById('start-btn');
      startBtn.addEventListener('click', handleStartExam);
    }

    function handleStartExam() {
      const randomizeOpt = document.getElementById('randomize-opt').checked;
      AppState.options.randomizeOrder = randomizeOpt;
      AppState.questionOrder.listening = buildQuestionOrder('listening', randomizeOpt);
      AppState.questionOrder.reading = buildQuestionOrder('reading', randomizeOpt);
      startListeningSection();
    }

    function buildQuestionOrder(section, randomize) {
      const count = section === 'listening' ? 30 : 40;
      const order = Array.from({ length: count }, (_, i) => i);
      return randomize ? fisherYatesShuffle(order) : order;
    }

    function fisherYatesShuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function startListeningSection() {
      AppState.currentSection = 'listening';
      AppState.currentQuestionIndex = 0;
      showScreen('exam');
      renderExamScreen();
      renderQuestion();
      renderSidebarGrid();
      startTimer('listening');
    }

    function renderExamScreen() {
      const examBody = document.getElementById('sidebar-content');
      examBody.innerHTML = '';
    }

    function renderQuestion() {
      const q = getCurrentQuestion();
      const wrapper = document.getElementById('question-wrapper');
      wrapper.innerHTML = '';

      const orderIndex = AppState.currentQuestionIndex;
      const sectionTotal = AppState.currentSection === 'listening' ? 30 : 40;
      const qNum = orderIndex + 1;

      document.getElementById('section-label').textContent = AppState.currentSection === 'listening' ? '듣기' : '읽기';
      document.getElementById('q-number').textContent = qNum;
      document.getElementById('q-total').textContent = sectionTotal;

      const userAnswer = AppState.answers[getQuestionKey()] || null;

      let content = `
        <div class="question-number">${AppState.currentSection.toUpperCase()} 문제 ${qNum}번</div>
        <div class="question-prompt">${q.prompt?.korean || q.sentence?.korean || q.passage?.korean || q.speakers?.[0]?.korean || q.question?.korean || ''}</div>
        <div class="question-romanization">${q.prompt?.romanization || q.sentence?.romanization || q.passage?.romanization || q.speakers?.[0]?.romanization || q.question?.romanization || ''}</div>
      `;

      if (q.type === 'picture-vocab') {
        content += `<div style="font-size: 64px; margin: var(--space-6) 0;">${q.pictureEmoji}</div>`;
      }

      if (q.audioIndicator) {
        content += `<button class="question-audio-btn">▶ [AUDIO CLIP]</button>`;
      }

      if (q.speakers && q.speakers.length) {
        content += `<div class="question-script">`;
        q.speakers.forEach(s => {
          content += `<div class="script-line"><span class="script-speaker">${s.label}:</span><span class="script-text">${s.korean}</span></div>`;
        });
        content += `</div>`;
        content += `<div class="question-prompt">${q.question?.korean || ''}</div>`;
        content += `<div class="question-romanization">${q.question?.romanization || ''}</div>`;
      }

      if (q.type === 'reading-comprehension' && q.passage) {
        content += `<div class="passage-text">${q.passage.korean}<br><span class="question-romanization">${q.passage.romanization}</span></div>`;
        content += `<div class="question-prompt">${q.question.korean}</div>`;
        content += `<div class="question-romanization">${q.question.romanization}</div>`;
      }

      content += `<div class="answer-options">`;
      q.options.forEach((opt, idx) => {
        const num = idx + 1;
        const isSelected = userAnswer === num ? ' answer-option--selected' : '';
        content += `
          <div class="answer-option${isSelected}" onclick="handleAnswerSelect(${num})">
            <div class="answer-option__number">${num}</div>
            <div class="answer-option__content">
              <div class="answer-option__text">${opt.korean}</div>
              <div class="answer-option__rom">${opt.romanization}</div>
            </div>
          </div>
        `;
      });
      content += `</div>`;

      wrapper.innerHTML = content;
      updateProgressBar();
      updateMarkButton();
    }

    function getCurrentQuestion() {
      const orderIndex = AppState.questionOrder[AppState.currentSection][AppState.currentQuestionIndex];
      return questionData[AppState.currentSection][orderIndex];
    }

    function getQuestionKey() {
      return `${AppState.currentSection}-${AppState.currentQuestionIndex}`;
    }

    function handleAnswerSelect(optionNumber) {
      const key = getQuestionKey();
      AppState.answers[key] = optionNumber;
      saveSessionToStorage();
      renderQuestion();
      updateGridCell();
    }

    function renderSidebarGrid() {
      const sidebar = document.getElementById('sidebar-content');
      let html = `
        <div class="sidebar__section-label">듣기</div>
        <div class="sidebar__grid">
      `;

      for (let i = 0; i < 30; i++) {
        const key = `listening-${i}`;
        let cellClass = 'grid-cell';
        if (AppState.currentSection === 'listening' && AppState.currentQuestionIndex === i) {
          cellClass += ' grid-cell--current';
        } else if (AppState.markedQuestions.has(key)) {
          cellClass += ' grid-cell--marked';
        } else if (AppState.answers[key]) {
          cellClass += ' grid-cell--answered';
        }
        html += `<div class="${cellClass}" onclick="goToQuestion('listening', ${i})">${i + 1}</div>`;
      }

      html += `</div><div class="sidebar__divider"></div>`;
      html += `<div class="sidebar__section-label">읽기</div>`;
      html += `<div class="sidebar__grid">`;

      for (let i = 0; i < 40; i++) {
        const key = `reading-${i}`;
        let cellClass = 'grid-cell';
        if (AppState.currentSection === 'reading' && AppState.currentQuestionIndex === i) {
          cellClass += ' grid-cell--current';
        } else if (AppState.markedQuestions.has(key)) {
          cellClass += ' grid-cell--marked';
        } else if (AppState.answers[key]) {
          cellClass += ' grid-cell--answered';
        }
        html += `<div class="${cellClass}" onclick="goToQuestion('reading', ${i})">${i + 1}</div>`;
      }

      html += `</div>`;
      html += `
        <div class="sidebar__legend">
          <div class="legend-item"><div class="legend-dot" style="background: var(--state-unanswered);"></div><span>미답</span></div>
          <div class="legend-item"><div class="legend-dot" style="background: var(--state-answered);"></div><span>답함</span></div>
          <div class="legend-item"><div class="legend-dot" style="background: var(--state-marked);"></div><span>표시</span></div>
        </div>
      `;

      sidebar.innerHTML = html;
    }

    function updateGridCell() {
      const key = getQuestionKey();
      const cells = document.querySelectorAll('.grid-cell');
      cells.forEach((cell, idx) => {
        const section = AppState.currentSection;
        const actualIdx = idx - (section === 'listening' ? 0 : 31);
        const cellKey = `${section}-${actualIdx}`;
        if (cellKey === key) {
          cell.classList.toggle('grid-cell--answered', !!AppState.answers[key]);
          cell.classList.remove('grid-cell--marked');
        }
      });
    }

    function goToQuestion(section, index) {
      AppState.currentSection = section;
      AppState.currentQuestionIndex = index;
      renderQuestion();
      renderSidebarGrid();
    }

    function updateProgressBar() {
      const total = AppState.currentSection === 'listening' ? 30 : 40;
      const answered = Object.values(AppState.answers).filter(v => v !== null).length;
      const pct = Math.round((answered / 70) * 100);
      document.getElementById('progress-pct').textContent = `${answered} / 70 답함`;
    }

    function updateMarkButton() {
      const btn = document.getElementById('mark-btn');
      const key = getQuestionKey();
      btn.classList.toggle('mark-btn--active', AppState.markedQuestions.has(key));
      btn.onclick = handleMarkToggle;
    }

    function handleMarkToggle() {
      const key = getQuestionKey();
      if (AppState.markedQuestions.has(key)) {
        AppState.markedQuestions.delete(key);
      } else {
        AppState.markedQuestions.add(key);
      }
      saveSessionToStorage();
      renderSidebarGrid();
      updateMarkButton();
    }

    function startTimer(section) {
      stopTimer();
      const timerData = AppState.timer[section];
      AppState.timer.intervalId = setInterval(() => tickTimer(section), 1000);
    }

    function tickTimer(section) {
      const timerData = AppState.timer[section];
      timerData.remainingSeconds--;
      renderTimerDisplay();
      updateTimerProgressBar();

      if (timerData.remainingSeconds % 10 === 0) {
        saveSessionToStorage();
      }

      if (timerData.remainingSeconds <= 0) {
        handleTimerExpiry();
      }
    }

    function renderTimerDisplay() {
      const secs = AppState.timer[AppState.currentSection].remainingSeconds;
      const display = document.getElementById('timer-display');
      const mins = Math.floor(secs / 60);
      const s = secs % 60;
      display.textContent = `${String(mins).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      display.classList.remove('timer-display--warning', 'timer-display--critical');
      if (secs <= 300) {
        display.classList.add('timer-display--critical');
      } else if (secs <= 600) {
        display.classList.add('timer-display--warning');
      }
    }

    function updateTimerProgressBar() {
      const section = AppState.currentSection;
      const { remainingSeconds, totalSeconds } = AppState.timer[section];
      const pct = (remainingSeconds / totalSeconds) * 100;
      const bar = document.getElementById('timer-progress');
      if (bar) bar.style.width = pct + '%';
    }

    function stopTimer() {
      if (AppState.timer.intervalId) clearInterval(AppState.timer.intervalId);
      AppState.timer.intervalId = null;
    }

    function handleTimerExpiry() {
      stopTimer();
      if (AppState.currentSection === 'listening') {
        startReadingSection();
      } else {
        transitionToResults();
      }
    }

    function startReadingSection() {
      AppState.currentSection = 'reading';
      AppState.currentQuestionIndex = 0;
      renderQuestion();
      renderSidebarGrid();
      startTimer('reading');
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('prev-btn').addEventListener('click', () => {
        if (AppState.currentQuestionIndex > 0) {
          AppState.currentQuestionIndex--;
          renderQuestion();
          renderSidebarGrid();
        }
      });

      document.getElementById('next-btn').addEventListener('click', () => {
        const total = AppState.currentSection === 'listening' ? 30 : 40;
        if (AppState.currentQuestionIndex < total - 1) {
          AppState.currentQuestionIndex++;
          renderQuestion();
          renderSidebarGrid();
        }
      });

      document.getElementById('submit-section-btn').addEventListener('click', () => {
        stopTimer();
        if (AppState.currentSection === 'listening') {
          startReadingSection();
        } else {
          transitionToResults();
        }
      });

      document.getElementById('review-toggle').addEventListener('click', () => {
        const list = document.getElementById('review-list');
        list.classList.toggle('review-list--open');
      });

      document.getElementById('retake-btn').addEventListener('click', () => {
        AppState = {
          phase: 'start',
          currentSection: 'listening',
          currentQuestionIndex: 0,
          answers: {},
          markedQuestions: new Set(),
          timer: {
            listening: { totalSeconds: 40 * 60, remainingSeconds: 40 * 60 },
            reading: { totalSeconds: 60 * 60, remainingSeconds: 60 * 60 },
            intervalId: null,
          },
          options: { randomizeOrder: false },
          questionOrder: { listening: [], reading: [] },
          results: null,
        };
        clearSession();
        showScreen('start');
        renderStartScreen();
      });

      init();
    });

    function transitionToResults() {
      calculateResults();
      showScreen('results');
      renderResultsScreen();
    }

    function calculateResults() {
      let listeningScore = 0;
      let readingScore = 0;
      const questionResults = [];

      questionData.listening.forEach((q, i) => {
        const key = `listening-${i}`;
        const userAnswer = AppState.answers[key] || null;
        const correct = userAnswer === q.correctAnswer;
        if (correct) listeningScore += SCORE_PER_Q.listening;
        questionResults.push({ key, section: 'listening', correct, userAnswer, correctAnswer: q.correctAnswer, ...q });
      });

      questionData.reading.forEach((q, i) => {
        const key = `reading-${i}`;
        const userAnswer = AppState.answers[key] || null;
        const correct = userAnswer === q.correctAnswer;
        if (correct) readingScore += SCORE_PER_Q.reading;
        questionResults.push({ key, section: 'reading', correct, userAnswer, correctAnswer: q.correctAnswer, ...q });
      });

      const totalScore = Math.round(listeningScore + readingScore);
      const roundedListening = Math.round(listeningScore);
      const roundedReading = Math.round(readingScore);
      let level = 'fail';
      if (totalScore >= 140) level = 'level2';
      else if (totalScore >= 80) level = 'level1';

      AppState.results = {
        listeningScore: roundedListening,
        readingScore: roundedReading,
        totalScore,
        level,
        questionResults,
      };
    }

    function renderResultsScreen() {
      const r = AppState.results;
      document.getElementById('total-score').textContent = r.totalScore;
      document.getElementById('listening-score').textContent = r.listeningScore;
      document.getElementById('reading-score').textContent = r.readingScore;

      let badgeHtml = '';
      if (r.level === 'level2') badgeHtml = '<div class="level-badge level-badge--level2">🏅 TOPIK 2급</div>';
      else if (r.level === 'level1') badgeHtml = '<div class="level-badge level-badge--level1">🎖️ TOPIK 1급</div>';
      else badgeHtml = '<div class="level-badge level-badge--fail">미달</div>';

      document.querySelector('.level-badge').outerHTML = badgeHtml;

      const reviewList = document.getElementById('review-list');
      reviewList.innerHTML = '';

      r.questionResults.forEach((result) => {
        const isCorrect = result.correct;
        const userAnswerText = result.userAnswer ? result.options[result.userAnswer - 1].korean : '미답';
        const correctAnswerText = result.options[result.correctAnswer - 1].korean;

        const itemClass = isCorrect ? 'review-item--correct' : result.userAnswer ? 'review-item--incorrect' : 'review-item--skipped';
        const resultText = isCorrect ? '✓ 정답' : result.userAnswer ? '✗ 오답' : '- 미답';

        let html = `
          <li class="review-item ${itemClass}" onclick="this.classList.toggle('review-item--open')">
            <div class="review-item__header">
              <div class="review-item__number">${result.section} Q${result.id}</div>
              <div class="review-item__result">${resultText}</div>
            </div>
            <div class="review-item__question">${result.question?.korean || result.prompt?.korean || result.sentence?.korean || ''}</div>
            <div class="review-answer-row">
              <span class="review-answer-label">당신의 답:</span>
              <span class="review-answer-text">${userAnswerText}</span>
            </div>
            <div class="review-answer-row">
              <span class="review-answer-label">정답:</span>
              <span class="review-answer-text">${correctAnswerText}</span>
            </div>
            <div class="review-item__explanation">${result.explanation?.english || ''}</div>
          </li>
        `;
        reviewList.innerHTML += html;
      });
    }

    function saveSessionToStorage() {
      const state = {
        version: 1,
        phase: AppState.phase,
        currentSection: AppState.currentSection,
        currentQuestionIndex: AppState.currentQuestionIndex,
        answers: AppState.answers,
        markedQuestions: Array.from(AppState.markedQuestions),
        timer: {
          listening: { remainingSeconds: AppState.timer.listening.remainingSeconds },
          reading: { remainingSeconds: AppState.timer.reading.remainingSeconds },
        },
        options: AppState.options,
        questionOrder: AppState.questionOrder,
        savedAt: Date.now(),
      };
      localStorage.setItem('topik1_session', JSON.stringify(state));
    }

    function loadSessionFromStorage() {
      const stored = localStorage.getItem('topik1_session');
      if (stored) {
        try {
          const state = JSON.parse(stored);
          AppState.phase = state.phase;
          AppState.currentSection = state.currentSection;
          AppState.currentQuestionIndex = state.currentQuestionIndex;
          AppState.answers = state.answers;
          AppState.markedQuestions = new Set(state.markedQuestions || []);
          AppState.timer.listening.remainingSeconds = state.timer?.listening?.remainingSeconds || 2400;
          AppState.timer.reading.remainingSeconds = state.timer?.reading?.remainingSeconds || 3600;
          AppState.options = state.options || AppState.options;
          AppState.questionOrder = state.questionOrder || AppState.questionOrder;
        } catch (e) {
          console.log('Failed to load session', e);
        }
      }
    }

    function clearSession() {
      localStorage.removeItem('topik1_session');
    }
  </script>
</body>
</html>
